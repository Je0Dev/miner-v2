# Mining Bindings v2 - Multi-Language Support
# Source in Hyprland config: source = ~/miner-v2/mining_bindings.conf
# Note: META = SUPER (both are Mod4/Windows key). Use CTRL/ALT/SHIFT combos instead.

# Quick Capture - Select region, OCR, translate, save with notification
# Using bindl (lock) to prevent key repeat from triggering twice
bindl = SUPER, X, exec, bash ~/miner-v2/mine.sh -l zh -t en
bindl = SUPER SHIFT, X, exec, bash ~/miner-v2/mine.sh -l ja -t en
bindl = SUPER ALT, X, exec, bash ~/miner-v2/mine.sh -l de -t en
bindl = SUPER CTRL, X, exec, bash ~/miner-v2/mine.sh -l ko -t en
bindl = SUPER ALT SHIFT, X, exec, bash ~/miner-v2/mine.sh -l es -t en
bindl = SUPER CTRL ALT, X, exec, bash ~/miner-v2/mine.sh -l el -t en
bindl = SUPER CTRL ALT SHIFT, X, exec, bash ~/miner-v2/mine.sh -l fr -t en
bindl = SUPER ALT CTRL, M, exec, bash ~/miner-v2/mine.sh -l pl -t en
bindl = SUPER ALT CTRL SHIFT, M, exec, bash ~/miner-v2/mine.sh -l ru -t en
bindl = SUPER CTRL SHIFT, M, exec, bash ~/miner-v2/mine.sh -l en -t en

# Extended Capture - 15s audio for dialogue sequences
bindl = SUPER CTRL, E, exec, bash ~/miner-v2/mine.sh -l zh -t en --extended
bindl = SUPER CTRL SHIFT, E, exec, bash ~/miner-v2/mine.sh -l ja -t en --extended
bindl = SUPER CTRL ALT, E, exec, bash ~/miner-v2/mine.sh -l de -t en --extended
bindl = SUPER CTRL ALT SHIFT, E, exec, bash ~/miner-v2/mine.sh -l ko -t en --extended

# Quick Instant Capture - Full screen capture for fast NPC dialogue (no region selection)
bindl = SUPER ALT CTRL, Q, exec, bash ~/miner-v2/quick.sh -l zh -t en
bindl = SUPER ALT CTRL SHIFT, Q, exec, bash ~/miner-v2/quick.sh -l ja -t en
bindl = SUPER CTRL SHIFT, Q, exec, bash ~/miner-v2/quick.sh -l de -t en
bindl = SUPER CTRL ALT, Q, exec, bash ~/miner-v2/quick.sh -l ko -t en

# Live OCR Overlay - Draggable box over text, auto-OCR + mine with audio
bind = SUPER, O, exec, bash ~/miner-v2/mine.sh --live -l zh -t en
bind = SUPER SHIFT, O, exec, bash ~/miner-v2/mine.sh --live -l ja -t en
bind = SUPER ALT, O, exec, bash ~/miner-v2/mine.sh --live -l de -t en
bind = SUPER CTRL, O, exec, bash ~/miner-v2/mine.sh --live -l ko -t en
bind = SUPER ALT SHIFT, O, exec, bash ~/miner-v2/mine.sh --live -l es -t en
bind = SUPER CTRL ALT, O, exec, bash ~/miner-v2/mine.sh --live -l el -t en

# Yomitan Hover - Small draggable window, move over text to OCR + clipboard
bind = SUPER, Y, exec, bash ~/miner-v2/yomitan-hover.sh chi_sim
bind = SUPER SHIFT, Y, exec, bash ~/miner-v2/yomitan-hover.sh jpn
bind = SUPER ALT, Y, exec, bash ~/miner-v2/yomitan-hover.sh deu
bind = SUPER CTRL, Y, exec, bash ~/miner-v2/yomitan-hover.sh kor

# Kill All
bind = SUPER CTRL, K, exec, pkill -f "miner-v2" 2>/dev/null; pkill -f "yomitan-hover" 2>/dev/null; notify-send "Miner Stopped" "All mining processes killed" -t 2000

# Utility Bindings
bind = SUPER CTRL, H, exec, notify-send "Miner Health" "$(python3 ~/miner-v2/main.py --health 2>&1)" -t 10000
bind = SUPER CTRL, S, exec, notify-send "Miner Stats" "$(python3 ~/miner-v2/main.py --stats 2>&1)" -t 10000
bind = SUPER CTRL, B, exec, python3 ~/miner-v2/main.py --backup && notify-send "Backup" "Mining data backed up" -t 3000
bind = SUPER CTRL, D, exec, python3 ~/miner-v2/yomitan-debug.py &
bind = SUPER CTRL, V, exec, bash ~/miner-v2/sentence_server.sh &

# Yomitan Bridge - WebSocket for direct browser extension communication
bind = SUPER CTRL, J, exec, python3 ~/miner-v2/main.py --bridge &

# Open Yomitan Bridge in browser (starts servers if needed)
bind = SUPER CTRL, W, exec, bash ~/miner-v2/sentence_server.sh & sleep 1 && python3 ~/miner-v2/main.py --bridge & sleep 1 && xdg-open http://localhost:5002/bridge

# Clipboard Monitor - Auto-process clipboard content
bind = SUPER CTRL, C, exec, python3 ~/miner-v2/main.py --clipboard &

# Live OCR with Parallel Translation (multi-engine)
bind = SUPER ALT, P, exec, bash ~/miner-v2/mine.sh --live --parallel -l zh -t en
bind = SUPER ALT SHIFT, P, exec, bash ~/miner-v2/mine.sh --live --parallel -l ja -t en

# Window Rules (Hyprland 0.53+ syntax)
windowrule {
    name = miner-overlay
    match:title = ^Live OCR Miner$
    float = true
    pin = true
    no_anim = true
    opacity = 0.95
}

windowrule {
    name = yomitan-hover
    match:title = ^Yomitan Hover$
    float = true
    pin = true
    no_anim = true
    opacity = 0.85
}
