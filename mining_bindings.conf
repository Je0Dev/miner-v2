# Mining Bindings v2 - Multi-Language Support
# Source in Hyprland config: source = ~/miner-v2/mining_bindings.conf

# Quick Capture - Select region, OCR, translate, save with notification
# Using bindl (lock) to prevent key repeat from triggering twice
bindl = SUPER, X, exec, bash ~/miner-v2/mine.sh -l zh -t en
bindl = SUPER SHIFT, X, exec, bash ~/miner-v2/mine.sh -l ja -t en
bindl = SUPER ALT, X, exec, bash ~/miner-v2/mine.sh -l de -t en
bindl = SUPER CTRL, X, exec, bash ~/miner-v2/mine.sh -l ko -t en
bindl = SUPER ALT SHIFT, X, exec, bash ~/miner-v2/mine.sh -l es -t en
bindl = SUPER CTRL ALT, X, exec, bash ~/miner-v2/mine.sh -l el -t en
bindl = SUPER CTRL ALT SHIFT, X, exec, bash ~/miner-v2/mine.sh -l fr -t en
bindl = SUPER META, X, exec, bash ~/miner-v2/mine.sh -l pl -t en

# Extended Capture - 15s audio for dialogue sequences
bindl = SUPER CTRL, X, exec, bash ~/miner-v2/mine.sh -l zh -t en --extended
bindl = SUPER CTRL SHIFT, X, exec, bash ~/miner-v2/mine.sh -l ja -t en --extended
bindl = SUPER CTRL ALT, X, exec, bash ~/miner-v2/mine.sh -l de -t en --extended

# Live OCR Overlay - Draggable box over text, auto-OCR + mine with audio
bind = SUPER, O, exec, bash ~/miner-v2/mine.sh --live -l zh -t en
bind = SUPER SHIFT, O, exec, bash ~/miner-v2/mine.sh --live -l ja -t en
bind = SUPER ALT, O, exec, bash ~/miner-v2/mine.sh --live -l de -t en
bind = SUPER CTRL, O, exec, bash ~/miner-v2/mine.sh --live -l ko -t en

# Yomitan Hover - Small draggable window, move over text to OCR + clipboard
bind = SUPER, Y, exec, bash ~/miner-v2/yomitan-hover.sh chi_sim
bind = SUPER SHIFT, Y, exec, bash ~/miner-v2/yomitan-hover.sh jpn

# Kill All
bind = SUPER CTRL, K, exec, pkill -f "miner-v2" 2>/dev/null; pkill -f "yomitan-hover" 2>/dev/null; notify-send "Miner Stopped" "All mining processes killed" -t 2000

# Window Rules (Hyprland 0.53+ syntax)
windowrule {
    name = miner-overlay
    match:title = ^Live OCR Miner$
    float = true
    pin = true
    no_anim = true
    opacity = 0.95
}

windowrule {
    name = yomitan-hover
    match:title = ^Yomitan Hover$
    float = true
    pin = true
    no_anim = true
    opacity = 0.85
}
